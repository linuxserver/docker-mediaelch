---

# jenkins variables
project_name: docker-mediaelch
external_type: github_stable
release_type: stable
release_tag: latest
ls_branch: master
build_armhf: false
repo_vars:
  - EXT_USER = 'Komet'
  - EXT_REPO = 'MediaElch'
  - BUILD_VERSION_ARG = 'MEDIAELCH_VERSION'
  - LS_USER = 'linuxserver'
  - LS_REPO = 'docker-mediaelch'
  - CONTAINER_NAME = 'mediaelch'
  - DOCKERHUB_IMAGE = 'linuxserver/mediaelch'
  - DEV_DOCKERHUB_IMAGE = 'lsiodev/mediaelch'
  - PR_DOCKERHUB_IMAGE = 'lspipepr/mediaelch'
  - DIST_IMAGE = 'ubuntu'
  - MULTIARCH = 'false'
  - CI = 'true'
  - CI_WEB = 'true'
  - CI_PORT = '3001'
  - CI_SSL = 'true'
  - CI_DELAY = '120'
  - CI_DOCKERENV = ''
  - CI_AUTH = ''
  - CI_WEBPATH = ''
